name: Telegram Bot (command listener)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write   # needed to push the keep-alive timestamp

jobs:
  listen:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Poll Telegram for commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_bot.py

      - name: Keep repo active (prevents GitHub cron throttling)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u)" > last_run.txt
          git add last_run.txt
          git commit -m "chore: keep-alive $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "Nothing to commit"
          git push
